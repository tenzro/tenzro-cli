name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          repository: tenzro/tenzro-network
          token: ${{ secrets.REPO_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release -p tenzro-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p tenzro-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          if [ -f tenzro ]; then
            tar czf ../../../tenzro-cli-${{ matrix.target }}.tar.gz tenzro
          elif [ -f tenzro-cli ]; then
            cp tenzro-cli tenzro
            tar czf ../../../tenzro-cli-${{ matrix.target }}.tar.gz tenzro
          fi
          cd ../../..
          shasum -a 256 tenzro-cli-${{ matrix.target }}.tar.gz >> checksums.txt

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          if (Test-Path tenzro.exe) {
            Compress-Archive -Path tenzro.exe -DestinationPath ../../../tenzro-cli-${{ matrix.target }}.zip
          } elseif (Test-Path tenzro-cli.exe) {
            Copy-Item tenzro-cli.exe tenzro.exe
            Compress-Archive -Path tenzro.exe -DestinationPath ../../../tenzro-cli-${{ matrix.target }}.zip
          }
          cd ../../..
          Get-FileHash tenzro-cli-${{ matrix.target }}.zip -Algorithm SHA256 | Format-Table Hash -HideTableHeaders >> checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenzro-cli-${{ matrix.target }}
          path: |
            tenzro-cli-${{ matrix.target }}.*
            checksums.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          cat artifacts/*/checksums.txt | sort -u > release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tenzro/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: tenzro-cli-aarch64-apple-darwin
          path: /tmp/sums

      - name: Get all checksums
        run: |
          # Download all artifacts for shasums
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            SHA=$(curl -sL "https://github.com/tenzro/tenzro-cli/releases/download/${{ github.ref_name }}/tenzro-cli-${target}.tar.gz" | shasum -a 256 | awk '{print $1}')
            echo "${target}=${SHA}" >> /tmp/shasums.txt
          done

      - name: Update formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip v prefix

          SHA_ARM64_MACOS=$(grep aarch64-apple-darwin /tmp/shasums.txt | cut -d= -f2)
          SHA_X64_MACOS=$(grep x86_64-apple-darwin /tmp/shasums.txt | cut -d= -f2)
          SHA_ARM64_LINUX=$(grep aarch64-unknown-linux-gnu /tmp/shasums.txt | cut -d= -f2)
          SHA_X64_LINUX=$(grep x86_64-unknown-linux-gnu /tmp/shasums.txt | cut -d= -f2)

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/tenzro-cli.rb
          sed -i "s/PLACEHOLDER_SHA256_ARM64_MACOS/${SHA_ARM64_MACOS}/" Formula/tenzro-cli.rb
          sed -i "s/PLACEHOLDER_SHA256_X64_MACOS/${SHA_X64_MACOS}/" Formula/tenzro-cli.rb
          sed -i "s/PLACEHOLDER_SHA256_ARM64_LINUX/${SHA_ARM64_LINUX}/" Formula/tenzro-cli.rb
          sed -i "s/PLACEHOLDER_SHA256_X64_LINUX/${SHA_X64_LINUX}/" Formula/tenzro-cli.rb

      - name: Commit and push
        run: |
          git config user.name "tenzro-bot"
          git config user.email "eng@tenzro.com"
          git add Formula/tenzro-cli.rb
          git commit -m "tenzro-cli ${{ github.ref_name }}"
          git push
